<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Activity Logs | AI Cyber Shield</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Fonts & Icons -->
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #020617, #0f172a);
      color: #f1f5f9;
      min-height: 100vh;
    }

    .cyber-grid {
      position: fixed;
      inset: 0;
      background:
        linear-gradient(rgba(6, 182, 212, .02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(6, 182, 212, .02) 1px, transparent 1px);
      background-size: 30px 30px;
      z-index: -1;
    }

    /* NAVBAR */
    .navbar {
      background: rgba(15, 23, 42, .9);
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(6, 182, 212, .2);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo h2 {
      font-family: 'Orbitron', sans-serif;
      background: linear-gradient(90deg, #06b6d4, #22d3ee);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* LAYOUT */
    .main {
      display: grid;
      grid-template-columns: 240px 1fr;
    }

    .sidebar {
      background: rgba(15, 23, 42, .8);
      padding: 25px;
      border-right: 1px solid rgba(6, 182, 212, .2);
      display: flex;
      flex-direction: column;
      min-height: calc(100vh - 65px);
    }

    .sidebar-footer {
      margin-top: auto;
      padding-top: 20px;
      border-top: 1px solid rgba(6, 182, 212, 0.1);
    }

    .verified-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #10b981;
      font-size: 0.85rem;
      font-weight: 600;
    }

    .sidebar a {
      display: flex;
      gap: 10px;
      align-items: center;
      padding: 12px;
      margin-bottom: 10px;
      color: #94a3b8;
      text-decoration: none;
      border-radius: 8px;
    }

    .sidebar a:hover,
    .sidebar a.active {
      background: rgba(6, 182, 212, .15);
      color: #06b6d4;
    }

    /* CONTENT */
    .content {
      padding: 30px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
    }

    /* FILTERS */
    .filters {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      margin-bottom: 20px;
      align-items: center;
    }

    .filters select,
    .filters input {
      background: #020617;
      border: 1px solid rgba(6, 182, 212, .3);
      color: #f1f5f9;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: .9rem;
    }

    .filters button {
      background: linear-gradient(90deg, #06b6d4, #0ea5e9);
      color: #fff;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: .9rem;
      transition: .2s;
    }

    .filters button:hover {
      opacity: .9;
    }

    .filter-count {
      color: #94a3b8;
      font-size: .85rem;
    }

    /* TABLE */
    .table-box {
      background: rgba(15, 23, 42, .8);
      border-radius: 12px;
      border: 1px solid rgba(6, 182, 212, .2);
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th,
    td {
      padding: 13px 16px;
      border-bottom: 1px solid rgba(6, 182, 212, .1);
      font-size: .88rem;
    }

    th {
      background: rgba(30, 41, 59, .7);
      color: #94a3b8;
      text-align: left;
      text-transform: uppercase;
      font-size: .75rem;
      letter-spacing: .04em;
    }

    tr:hover {
      background: rgba(6, 182, 212, .05);
    }

    .badge {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: .72rem;
      font-weight: 600;
    }

    .success {
      background: rgba(16, 185, 129, .15);
      color: #10b981;
      border: 1px solid rgba(16, 185, 129, .3);
    }

    .suspicious {
      background: rgba(245, 158, 11, .15);
      color: #f59e0b;
      border: 1px solid rgba(245, 158, 11, .3);
    }

    .blocked {
      background: rgba(239, 68, 68, .15);
      color: #ef4444;
      border: 1px solid rgba(239, 68, 68, .3);
    }

    .btn-delete {
      background: none;
      border: none;
      color: #ef4444;
      cursor: pointer;
      padding: 5px 8px;
      border-radius: 6px;
      transition: .2s;
      font-size: 1rem;
    }

    .btn-delete:hover {
      background: rgba(239, 68, 68, .15);
    }

    .footer {
      text-align: center;
      margin-top: 30px;
      color: #94a3b8;
      font-size: .85rem;
    }
  </style>
</head>

<body>
  <div class="cyber-grid"></div>

  <nav class="navbar">
    <div class="logo">
      <i class="fas fa-shield-halved"></i>
      <h2>AI Cyber Shield</h2>
    </div>
    <i class="fas fa-user-circle"></i>
  </nav>

  <div class="main">

    <aside class="sidebar">
      <a href="/dashboard"><i class="fas fa-chart-line"></i> Dashboard</a>
      <a href="/activity-logs" class="active"><i class="fas fa-clock-rotate-left"></i> Activity Logs</a>
      <a href="/admin-dashboard" class="admin-only"><i class="fas fa-user-lock"></i> Admin Panel</a>
      <a href="/xai"><i class="fas fa-brain"></i> XAI Explanation</a>
      <a href="/admin-blocked" class="admin-only"><i class="fas fa-ban"></i> Blocked Accounts</a>
      <a href="/deviation"><i class="fas fa-chart-bar"></i> Deviation Analysis</a>
      <a href="/" onclick="localStorage.clear()"><i class="fas fa-right-from-bracket"></i> Logout</a>
      <div class="sidebar-footer">
        <div class="verified-badge">
          <i class="fas fa-check-circle"></i> Verified Security
        </div>
      </div>
    </aside>



    <section class="content">
      <div class="header">
        <h1>User Activity Logs</h1>
        <span>AI-monitored login history</span>
      </div>

      <!-- FILTERS -->
      <div class="filters">
        <input type="date" id="dateFilter" title="Filter by date">
        <select id="statusFilter" title="Filter by status">
          <option value="">All Status</option>
          <option value="success">Success</option>
          <option value="suspicious">Suspicious</option>
          <option value="blocked">Blocked</option>
          <option value="otp_pending">OTP Pending</option>
          <option value="otp_pending_fail">OTP Pending (Failed PW)</option>
        </select>
        <button id="applyBtn" onclick="applyFilter()"><i class="fas fa-filter"></i> Apply Filter</button>
        <button style="background:rgba(148,163,184,.15);color:#94a3b8;border:1px solid rgba(148,163,184,.2);"
          onclick="clearFilter()"><i class="fas fa-times"></i> Clear Filter</button>
        <button onclick="clearAllLogs()"
          style="background:rgba(239,68,68,0.1); color:#ef4444; border:1px solid #ef4444; padding:10px 15px; border-radius:8px; font-size:0.9rem; font-weight:600; cursor:pointer;"><i
            class="fas fa-history"></i> Clear All Info</button>
        <span class="filter-count" id="filterCount"></span>
      </div>

      <!-- TABLE -->
      <div class="table-box">
        <table>
          <thead>
            <tr>
              <th>Time</th>
              <th>User</th>
              <th>IP Address</th>
              <th>Location</th>
              <th>Device</th>
              <th>Status</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="logTable">
            <tr>
              <td colspan="7" style="text-align:center;color:#94a3b8">Loading logs...</td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="footer">
        © 2026 AI Cyber Shield — Activity Monitoring Module
      </div>
    </section>
  </div>
  <script>
    function logout() {
      localStorage.clear();
      window.location.href = "/";
    }

    // ── Auth Guard ──
    const savedRole = localStorage.getItem("role");
    if (!savedRole) {
      window.location.href = "/";
    }

    // Hide admin-only links if not admin
    if (savedRole !== "admin") {
      document.querySelectorAll(".admin-only").forEach(el => el.style.display = "none");
    }

    let logs = [];
    // stores all backend data

    // Load logs from backend API
    async function loadBackendLogs() {
      try {
        const response = await fetch("/api/activity-logs", {
          headers: { "Authorization": localStorage.getItem("token") }
        });
        if (!response.ok) {
          const errData = await response.json();
          if (response.status === 403 && errData.status === "blocked") {
            sessionStorage.setItem("block_info", JSON.stringify(errData));
            window.location.href = "/blocked-account";
            return;
          }
          if (response.status === 401 || response.status === 403) window.location.href = "/";
          throw new Error("Failed to fetch logs");
        }
        logs = await response.json();
        renderLogs(logs);
        document.getElementById("filterCount").textContent = `Total: ${logs.length} records`;
      } catch (err) {
        console.error(err);
        const tbody = document.getElementById("logTable");
        tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;color:red">Error loading logs</td></tr>`;
      }
    }

    // Normalize status for badge class
    function getBadgeClass(status) {
      if (!status) return "suspicious";
      const s = status.toLowerCase();
      if (s === "success") return "success";
      if (s === "blocked") return "blocked";
      // Everything else (suspicious, otp_pending, otp_pending_fail, etc.)
      return "suspicious";
    }

    // Render logs in table
    function renderLogs(data) {
      const tbody = document.getElementById("logTable");
      tbody.innerHTML = "";
      if (data.length === 0) {
        tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;color:#94a3b8">No logs found for this filter</td></tr>`;
        document.getElementById("filterCount").textContent = `Showing 0 records`;
        return;
      }
      document.getElementById("filterCount").textContent = `Showing ${data.length} records`;
      data.forEach(l => {
        const cls = getBadgeClass(l.status);
        tbody.innerHTML += `
      <tr>
        <td>${l.time || '—'}</td>
        <td>${l.user_email || '—'}</td>
        <td>${l.ip || '—'}</td>
        <td>${l.loc || '—'}</td>
        <td>${l.dev || '—'}</td>
        <td><span class="badge ${cls}">${l.status}</span></td>
        <td>
          <button class="btn-delete" onclick="deleteLog(${l.log_id})" title="Delete log">
            <i class="fas fa-trash-alt"></i>
          </button>
        </td>
      </tr>`;
      });
    }

    async function deleteLog(id) {
      if (!confirm("Are you sure you want to delete this log?")) return;
      try {
        const res = await fetch("/api/delete-log", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": localStorage.getItem("token")
          },
          body: JSON.stringify({ log_id: id })
        });
        if (res.ok) {
          loadBackendLogs();
        }
      } catch (err) {
        console.error(err);
      }
    }

    async function clearAllLogs() {
      if (!confirm("Are you sure you want to delete ALL logs? This cannot be undone.")) return;
      try {
        const res = await fetch("/api/clear-all-logs", {
          method: "POST",
          headers: { "Authorization": localStorage.getItem("token") }
        });
        if (res.ok) {
          alert("All logs cleared.");
          loadBackendLogs();
        }
      } catch (e) { alert("Failed to clear logs."); }
    }

    // Filter logs based on status and/or date (case-insensitive)
    function applyFilter() {
      const statusVal = document.getElementById("statusFilter").value.toLowerCase();
      const dateVal = document.getElementById("dateFilter").value; // YYYY-MM-DD

      let filtered = logs;

      // Status filter (case-insensitive)
      if (statusVal) {
        filtered = filtered.filter(l => {
          const logStatus = (l.status || "").toLowerCase();
          // Normalize: "success" matches "success"
          if (statusVal === "success") return logStatus === "success";
          if (statusVal === "blocked") return logStatus === "blocked";
          if (statusVal === "suspicious") return logStatus === "suspicious";
          if (statusVal === "otp_pending") return logStatus === "otp_pending";
          if (statusVal === "otp_pending_fail") return logStatus === "otp_pending_fail";
          return logStatus === statusVal;
        });
      }

      // Date filter: match YYYY-MM-DD at start of time string
      if (dateVal) {
        filtered = filtered.filter(l => l.time && l.time.startsWith(dateVal));
      }

      renderLogs(filtered);
    }

    function clearFilter() {
      document.getElementById("statusFilter").value = "";
      document.getElementById("dateFilter").value = "";
      renderLogs(logs);
      document.getElementById("filterCount").textContent = `Total: ${logs.length} records`;
    }

    // Load logs from backend on page load
    loadBackendLogs();
  </script>


</body>

</html>
