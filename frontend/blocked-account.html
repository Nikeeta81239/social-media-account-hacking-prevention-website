<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Blocked Accounts | AI Cyber Shield</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Fonts & Icons -->
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #020617, #0f172a);
      color: #f1f5f9;
      min-height: 100vh;
    }

    .cyber-grid {
      position: fixed;
      inset: 0;
      background:
        linear-gradient(rgba(6, 182, 212, .02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(6, 182, 212, .02) 1px, transparent 1px);
      background-size: 30px 30px;
      z-index: -1;
    }

    /* NAVBAR */
    .navbar {
      background: rgba(15, 23, 42, .9);
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(6, 182, 212, .2);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo h2 {
      font-family: 'Orbitron', sans-serif;
      background: linear-gradient(90deg, #06b6d4, #22d3ee);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* LAYOUT */
    .main {
      display: grid;
      grid-template-columns: 240px 1fr;
    }

    .sidebar {
      background: rgba(15, 23, 42, .8);
      padding: 25px;
      border-right: 1px solid rgba(6, 182, 212, .2);
    }

    .sidebar a {
      display: flex;
      gap: 10px;
      align-items: center;
      padding: 12px;
      margin-bottom: 10px;
      color: #94a3b8;
      text-decoration: none;
      border-radius: 8px;
    }

    .sidebar a:hover,
    .sidebar a.active {
      background: rgba(6, 182, 212, .15);
      color: #06b6d4;
    }

    /* CONTENT */
    .content {
      padding: 30px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
    }

    /* TABLE */
    .table-box {
      background: rgba(15, 23, 42, .85);
      border-radius: 12px;
      border: 1px solid rgba(6, 182, 212, .2);
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th,
    td {
      padding: 14px 16px;
      border-bottom: 1px solid rgba(6, 182, 212, .1);
    }

    th {
      background: rgba(30, 41, 59, .7);
      color: #94a3b8;
      text-align: left;
    }

    tr:hover {
      background: rgba(6, 182, 212, .05);
    }

    /* BADGES */
    .badge {
      padding: 5px 10px;
      border-radius: 20px;
      font-size: .75rem;
      font-weight: 600;
    }

    .ai {
      background: #ef4444;
      color: #2b0202;
    }

    .admin {
      background: #f59e0b;
      color: #2a1600;
    }

    button {
      background: #10b981;
      color: #022c22;
      border: none;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
    }

    button:hover {
      background: #22c55e;
    }

    .footer {
      text-align: center;
      margin-top: 30px;
      color: #94a3b8;
      font-size: .85rem;
    }
  </style>
</head>

<body>
  <div class="cyber-grid"></div>

  <nav class="navbar">
    <div class="logo">
      <i class="fas fa-shield-halved"></i>
      <h2>AI Cyber Shield</h2>
    </div>
    <span>Admin</span>
  </nav>

  <div class="main">

    <aside class="sidebar">
      <a href="/dashboard"><i class="fas fa-chart-line"></i> Dashboard</a>
      <a href="/activity-logs"><i class="fas fa-clock-rotate-left"></i> Activity Logs</a>
      <a href="/admin-dashboard"><i class="fas fa-user-lock"></i> Admin Panel</a>
      <a href="/xai"><i class="fas fa-brain"></i> XAI Explanation</a>
      <a href="/blocked-account" class="active"><i class="fas fa-ban"></i> Blocked Accounts</a>
      <a href="/deviation"><i class="fas fa-chart-bar"></i> Deviation</a>
      <a href="/" onclick="localStorage.clear()"><i class="fas fa-right-from-bracket"></i> Logout</a>
    </aside>


    <section class="content">
      <div class="header">
        <h1>Blocked Accounts</h1>
        <span>Accounts restricted due to security threats</span>
      </div>

      <div class="table-box">
        <table>
          <thead>
            <tr>
              <th>User</th>
              <th>IP Address</th>
              <th>Blocked By</th>
              <th>Reason</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="blockedTable"></tbody>
        </table>
      </div>

      <div class="footer">
        © 2026 AI Cyber Shield — Account Restriction Module
      </div>
    </section>
  </div>

  <script>

    function logout() {
      localStorage.clear();
      window.location.href = "/";
    }
    // ----- Role-based Access: Only Admin -----
    let role = localStorage.getItem('role'); // role: 'user' or 'admin'
    if (role !== 'admin') {
      alert("Access Denied. Only admins can view this page.");
      window.location.href = '/dashboard'; // redirect non-admins
    }

    // ----- Backend URL -----
    const BASE_URL = "/api";

    // ----- Load Blocked Users from Backend -----
    async function loadBlockedUsers() {
      const tbody = document.getElementById("blockedTable");
      tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;color:#94a3b8">Loading blocked accounts...</td></tr>`;

      try {
        const response = await fetch(`${BASE_URL}/blocked-users`);
        if (!response.ok) throw new Error("Failed to fetch blocked users");

        const blockedUsers = await response.json();

        if (blockedUsers.length === 0) {
          tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;color:#94a3b8">No blocked accounts</td></tr>`;
          return;
        }

        tbody.innerHTML = "";
        blockedUsers.forEach(b => {
          const badge = b.by === "AI" ? "ai" : "admin";
          tbody.innerHTML += `
        <tr>
          <td>${b.user}</td>
          <td>${b.ip}</td>
          <td><span class="badge ${badge}">${b.by}</span></td>
          <td>${b.reason}</td>
          <td>
            <button onclick="unblockUser('${b.user}')">Unblock</button>
            <i class="fas fa-trash" style="color:#ef4444;cursor:pointer;margin-left:10px" onclick="deleteBlockedRecord('${b.user}')"></i>
          </td>
        </tr>`;
        });

      } catch (err) {
        console.error(err);
        tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;color:red">Error loading blocked users</td></tr>`;
      }
    }

    async function deleteBlockedRecord(userEmail) {
      if (!confirm("Permanently delete this blocked record? (User will NOT be unblocked, just the record removed)")) return;
      try {
        const res = await fetch("/api/unblock-user", { // Reusing unblock for removal from list
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ user: userEmail })
        });
        if (res.ok) {
          alert("Record removed");
          loadBlockedUsers();
        }
      } catch (err) {
        console.error(err);
      }
    }

    // ----- Unblock User Function -----
    async function unblockUser(user) {
      try {
        const response = await fetch(`${BASE_URL}/unblock-user`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ user })
        });
        if (!response.ok) throw new Error("Failed to unblock user");

        const result = await response.json();
        alert(result.message);

        // Reload the table after unblocking
        loadBlockedUsers();
      } catch (err) {
        console.error(err);
        alert("Error unblocking user");
      }
    }

    // Load blocked users on page load
    loadBlockedUsers();
  </script>
</body>

</html>
