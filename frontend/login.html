
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Secure Login | AI Cyber Shield</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{
    background:linear-gradient(135deg,#020617,#0f172a);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:#f1f5f9;
}
.cyber-grid{
    position:fixed;
    inset:0;
    background:
        linear-gradient(rgba(6,182,212,.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(6,182,212,.05) 1px, transparent 1px);
    background-size:50px 50px;
    z-index:-1;
}
.login-container{
    background:rgba(15,23,42,.9);
    border:1px solid rgba(6,182,212,.3);
    border-radius:20px;
    padding:40px;
    width:100%;
    max-width:430px;
    box-shadow:0 0 60px rgba(6,182,212,.15);
}
.logo{text-align:center;margin-bottom:30px;}
.logo i{font-size:3rem;color:#06b6d4;}
.logo h1{
    font-family:'Orbitron',sans-serif;
    margin-top:10px;
    background:linear-gradient(90deg,#06b6d4,#22d3ee);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}
.input-group{margin-bottom:20px;}
label{display:block;margin-bottom:6px;font-size:.9rem;color:#94a3b8;}
input,select{
    width:100%;
    padding:14px 16px;
    border-radius:12px;
    border:2px solid rgba(6,182,212,.2);
    background:#020617;
    color:#f1f5f9;
    font-size:1rem;
}
.password-box{position:relative;}
.password-box i{
    position:absolute;
    right:15px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
    color:#94a3b8;
}
button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:linear-gradient(90deg,#06b6d4,#0ea5e9);
    color:#fff;
    font-size:1.1rem;
    font-weight:600;
    cursor:pointer;
}
.meta-box{
    background:rgba(30,41,59,.6);
    border-left:3px solid #06b6d4;
    padding:15px;
    border-radius:8px;
    margin-top:25px;
    font-size:.85rem;
    color:#94a3b8;
}
</style>
</head>

<body>
<div class="cyber-grid"></div>

<div class="login-container">
    <div class="logo">
        <i class="fas fa-shield-halved"></i>
        <h1>Secure Login</h1>
        <p>AI-Based Account Protection</p>
    </div>

    <form id="loginForm">
        <div class="input-group">
            <label>Gmail</label>
            <input type="email" id="email" placeholder="example@gmail.com" required>
        </div>

        <div class="input-group">
            <label>Password</label>
            <div class="password-box">
                <input type="password" id="password" required>
                <i class="fas fa-eye" id="togglePassword"></i>
            </div>
        </div>

        <div class="input-group">
            <label>Role</label>
            <select id="roleSelect" required>
                <option value="">Select Role</option>
                <option value="user">User</option>
                <option value="admin">Admin</option>
            </select>
        </div>

        <button type="submit"><i class="fas fa-lock"></i> Login</button>
    </form>

    <div class="meta-box">
        🔐 AI analyzes device, location & behavior before allowing access.
    </div>
</div>

<script>
// ===== Eye Toggle =====
const togglePassword = document.getElementById("togglePassword");
const passwordInput = document.getElementById("password");

togglePassword.addEventListener("click", () => {
    if (passwordInput.type === "password") {
        passwordInput.type = "text";
        togglePassword.classList.replace("fa-eye", "fa-eye-slash");
    } else {
        passwordInput.type = "password";
        togglePassword.classList.replace("fa-eye-slash", "fa-eye");
    }
});


// ===== Login Form =====
document.getElementById("loginForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const role = document.getElementById("roleSelect").value;

    try {
        const res = await fetch("http://127.0.0.1:5000/api/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password, role })
        });

        const data = await res.json();

        if (res.status !== 200) {
            alert(data.message || "Login failed");
            return;
        }

        // 🚫 BLOCKED ACCOUNT (FOR BOTH USER & ADMIN)
        if (data.status === "blocked") {
            alert("❌ Your account is blocked. Contact Admin.");
            return;
        }

        // ✅ ADMIN LOGIN (NO OTP LIMIT)
        if (data.role === "admin") {
            localStorage.setItem("token", data.token);
            localStorage.setItem("role", "admin");

            // Admin can access all pages
            window.location.href = "/admin-dashboard";
            return;
        }

        // ✅ USER LOGIN WITH OTP LIMIT CHECK
        if (data.role === "user") {

            // OTP limit exceeded
            if (data.status === "otp_limit_exceeded") {
                alert("⚠ OTP request limit exceeded. Try again later.");
                return;
            }

            // OTP required
            if (data.status === "otp_required") {
                localStorage.setItem("user_id", data.user_id);
                localStorage.setItem("role", "user");

                window.location.href = "/otp-verification";
                return;
            }
        }

    } catch (err) {
        console.error(err);
        alert("Server error. Try again later.");
    }
});
</script>
</body>
</html>
