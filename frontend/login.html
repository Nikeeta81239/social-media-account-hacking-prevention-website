<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Secure Login | AI Cyber Shield</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #020617, #0f172a);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #f1f5f9;
        }

        .cyber-grid {
            position: fixed;
            inset: 0;
            background:
                linear-gradient(rgba(6, 182, 212, .05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(6, 182, 212, .05) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
        }

        .login-container {
            background: rgba(15, 23, 42, .9);
            border: 1px solid rgba(6, 182, 212, .3);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 430px;
            box-shadow: 0 0 60px rgba(6, 182, 212, .15);
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo i {
            font-size: 3rem;
            color: #06b6d4;
        }

        .logo h1 {
            font-family: 'Orbitron', sans-serif;
            margin-top: 10px;
            background: linear-gradient(90deg, #06b6d4, #22d3ee);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: .9rem;
            color: #94a3b8;
        }

        input,
        select {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 2px solid rgba(6, 182, 212, .2);
            background: #020617;
            color: #f1f5f9;
            font-size: 1rem;
        }

        .password-box {
            position: relative;
        }

        .password-box i {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #94a3b8;
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(90deg, #06b6d4, #0ea5e9);
            color: #fff;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: .2s;
        }

        button:hover {
            opacity: .9;
        }

        button:disabled {
            opacity: .5;
            cursor: not-allowed;
        }

        .meta-box {
            background: rgba(30, 41, 59, .6);
            border-left: 3px solid #06b6d4;
            padding: 15px;
            border-radius: 8px;
            margin-top: 25px;
            font-size: .85rem;
            color: #94a3b8;
        }

        #msgBox {
            padding: 14px 16px;
            border-radius: 10px;
            margin-bottom: 16px;
            font-size: .88rem;
            font-weight: 500;
            white-space: pre-wrap;
            display: none;
            animation: fadeIn .3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-6px);
            }

            to {
                opacity: 1;
                transform: none;
            }
        }
    </style>
</head>

<body>
    <div class="cyber-grid"></div>

    <div class="login-container">
        <div class="logo">
            <i class="fas fa-shield-halved"></i>
            <h1>Secure Login</h1>
            <p>AI-Based Account Protection</p>
        </div>

        <form id="loginForm" novalidate>
            <div class="input-group">
                <label for="email">Gmail</label>
                <input type="email" id="email" placeholder="example@gmail.com" autocomplete="username" required
                    aria-required="true">
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <div class="password-box">
                    <input type="password" id="password" autocomplete="current-password" required aria-required="true">
                    <i class="fas fa-eye" id="togglePassword" aria-label="Toggle Password Visibility" role="button"></i>
                </div>
            </div>

            <div style="text-align: right; margin-bottom: 20px;">
                <a href="#" id="forgotPassword" style="color:#06b6d4;text-decoration:none;font-size:0.85rem;">Forgot
                    Password?</a>
            </div>

            <div class="input-group">
                <label for="roleSelect">Role</label>
                <select id="roleSelect" required aria-required="true">
                    <option value="">Select Role</option>
                    <option value="user">User</option>
                    <option value="admin">Admin</option>
                </select>
            </div>

            <!-- Inline message (replaces browser alert) -->
            <div id="msgBox"></div>

            <button type="submit" id="loginBtn"><i class="fas fa-lock"></i> Login</button>
        </form>

        <div class="meta-box" aria-live="polite">
            🔐 AI analyzes device, location &amp; behavior before allowing access.<br><br>
            New user? <a href="/register" style="color:#06b6d4;text-decoration:none;font-weight:600;">Register here</a>
        </div>
    </div>

    <script>
        // ===== Eye Toggle =====
        const togglePassword = document.getElementById("togglePassword");
        const passwordInput = document.getElementById("password");

        togglePassword.addEventListener("click", () => {
            if (passwordInput.type === "password") {
                passwordInput.type = "text";
                togglePassword.classList.replace("fa-eye", "fa-eye-slash");
            } else {
                passwordInput.type = "password";
                togglePassword.classList.replace("fa-eye-slash", "fa-eye");
            }
        });

        // ===== Styled Message Helper (no browser alert) =====
        function showMsg(type, html) {
            const box = document.getElementById("msgBox");
            box.style.display = "block";
            const styles = {
                blocked: { bg: "rgba(239,68,68,.15)", border: "rgba(239,68,68,.4)", color: "#fca5a5", icon: "fa-ban" },
                error: { bg: "rgba(239,68,68,.1)", border: "rgba(239,68,68,.3)", color: "#fca5a5", icon: "fa-circle-exclamation" },
                warning: { bg: "rgba(245,158,11,.12)", border: "rgba(245,158,11,.35)", color: "#fde68a", icon: "fa-triangle-exclamation" },
                info: { bg: "rgba(245,158,11,.12)", border: "rgba(245,158,11,.35)", color: "#fde68a", icon: "fa-shield-halved" },
                success: { bg: "rgba(16,185,129,.12)", border: "rgba(16,185,129,.35)", color: "#6ee7b7", icon: "fa-check-circle" }
            };
            const s = styles[type] || styles.error;
            box.style.background = s.bg;
            box.style.border = `1px solid ${s.border}`;
            box.style.color = s.color;
            box.innerHTML = `<i class="fas ${s.icon}"></i> &nbsp;${html}`;
        }

        // ===== Forgot Password =====
        document.getElementById("forgotPassword").addEventListener("click", async (e) => {
            e.preventDefault();
            const email = document.getElementById("email").value.trim();
            if (!email) {
                showMsg("error", "Please enter your email first to recover.");
                return;
            }

            // Capture info for security alert
            const device = navigator.userAgent.split(')')[0].split('(')[1] || "Unknown Device";
            let location = "Unknown Location";
            let ip = "0.0.0.0";
            try {
                const locRes = await fetch('https://ipapi.co/json/');
                const locData = await locRes.json();
                location = `${locData.city}, ${locData.country_name}`;
                ip = locData.ip;
            } catch (e) { }

            showMsg("info", "Sending security alert and recovery instructions...");

            try {
                const res = await fetch("/api/forgot-password", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, device, location, ip })
                });
                const data = await res.json();
                if (res.ok) {
                    showMsg("success", "Security alert sent! Please check your email for recovery instructions.");
                } else {
                    showMsg("error", data.message || "Failed to initiate recovery.");
                }
            } catch (err) {
                showMsg("error", "Connection error.");
            }
        });

        // ===== Login Form =====
        document.getElementById("loginForm").addEventListener("submit", async (e) => {
            e.preventDefault();

            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;
            const role = document.getElementById("roleSelect").value;
            const btn = document.getElementById("loginBtn");

            if (!email || !password || !role) {
                showMsg("error", "Please fill in all fields.");
                return;
            }

            if (btn.disabled) return; // extra safety
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Verifying...';

            try {
                // --- Capture Live Device Info ---
                const device = navigator.userAgent.split(')')[0].split('(')[1] || "Unknown Device";

                // --- Capture Live Location (External API) ---
                let location = "Unknown Location";
                let ip = "0.0.0.0";
                try {
                    const locRes = await fetch('https://ipapi.co/json/');
                    const locData = await locRes.json();
                    location = `${locData.city}, ${locData.country_name}`;
                    ip = locData.ip;
                } catch (e) { console.warn("Location fetch failed", e); }

                const loginPayload = { email, password, role, device, location, ip };
                console.log("[DEBUG] Sending login attempt:", loginPayload);

                const res = await fetch("/api/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(loginPayload)
                });

                const data = await res.json();

                // ── 🔴 BLOCKED — Redirect to Blocked Page ──
                if (res.status === 403 || data.status === "blocked") {
                    showMsg("blocked", `🔒 &nbsp;<strong>Restricted</strong><br>${data.message}<br><div style='font-size:0.8rem; margin-top:5px; color:#fca5a5;'>Reason: ${data.reason || "Suspicious activity detected."}</div>`);
                    btn.disabled = true;
                    btn.innerHTML = '<i class="fas fa-ban"></i> Blocked';

                    // Store blocking info for the redirect page
                    sessionStorage.setItem("block_info", JSON.stringify(data));

                    setTimeout(() => window.location.href = "/blocked-account", 2000);
                    return;
                }

                // ── ❌ WRONG PASSWORD ──
                if (!res.ok) {
                    showMsg("error", data.message || "Invalid credentials.");
                    document.getElementById("password").value = "";
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-lock"></i> Login';
                    return;
                }

                // ── 🟡 OTP REQUIRED ──
                if (data.status === "otp_required") {
                    localStorage.setItem("user_id", data.user_id);
                    localStorage.setItem("role", data.role || "user");
                    // Store XAI for display on dashboard later if needed, or use it now
                    if (data.xai) {
                        sessionStorage.setItem("login_xai", JSON.stringify(data.xai));
                    }

                    showMsg("info", data.message);
                    setTimeout(() => window.location.href = "/otp-verification", 2500);
                    return;
                }

                // ── ✅ DIRECT SUCCESS ──
                localStorage.setItem("token", data.token);
                localStorage.setItem("role", data.role);
                localStorage.setItem("user_id", data.user_id);
                localStorage.setItem("is_restricted", "false");
                if (data.xai) {
                    sessionStorage.setItem("login_xai", JSON.stringify(data.xai));
                }

                showMsg("success", "✔ Success! Redirecting...");
                const target = data.role === "admin" ? "/admin-dashboard" : "/dashboard";
                setTimeout(() => window.location.href = target, 800);

            } catch (err) {
                console.error("Login attempt failed:", err);
                let errorMsg = "An unexpected error occurred. Please try again.";
                if (err.message) errorMsg = err.message;

                showMsg("error", "<strong>Server Error:</strong><br>" + errorMsg);
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-lock"></i> Login';
            }
        });
    </script>
</body>

</html>
