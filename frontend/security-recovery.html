<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Security Identity Recovery | AI Cyber Shield</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #020617, #0f172a);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #f1f5f9;
        }

        .cyber-grid {
            position: fixed;
            inset: 0;
            background: linear-gradient(rgba(6, 182, 212, .05) 1px, transparent 1px), linear-gradient(90deg, rgba(6, 182, 212, .05) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
        }

        .recovery-container {
            background: rgba(15, 23, 42, .9);
            border: 1px solid rgba(6, 182, 212, .3);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 0 60px rgba(6, 182, 212, .15);
            text-align: center;
        }

        .logo i {
            font-size: 3rem;
            color: #06b6d4;
            margin-bottom: 20px;
        }

        h2 {
            font-family: 'Orbitron', sans-serif;
            margin-bottom: 10px;
            color: #06b6d4;
        }

        p {
            color: #94a3b8;
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .otp-inputs {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .otp-input {
            width: 60px;
            height: 65px;
            text-align: center;
            font-size: 1.8rem;
            font-weight: bold;
            background: #020617;
            border: 2px solid rgba(6, 182, 212, .2);
            border-radius: 12px;
            color: #f1f5f9;
            outline: none;
            transition: 0.3s;
        }

        .otp-input:focus {
            border-color: #06b6d4;
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.3);
        }

        .btn-verify {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(90deg, #06b6d4, #0ea5e9);
            color: white;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-verify:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .btn-verify:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .success-actions {
            display: none;
            margin-top: 20px;
            flex-direction: column;
            gap: 12px;
        }

        .btn-action {
            padding: 14px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            text-align: center;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-dash {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid #10b981;
            color: #10b981;
        }

        .btn-pass {
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid #f59e0b;
            color: #f59e0b;
        }

        .btn-action:hover {
            transform: scale(1.02);
        }

        #msgBox {
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            display: none;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>
    <div class="cyber-grid"></div>
    <div class="recovery-container">
        <div class="logo"><i class="fas fa-shield-virus"></i></div>
        <h2>Identity Verified?</h2>
        <p id="subtext">Please enter the security recovery OTP sent to <span id="displayEmail"
                style="color:#06b6d4"></span></p>

        <form id="recoveryForm">
            <div class="otp-inputs">
                <input type="text" class="otp-input" maxlength="1" required>
                <input type="text" class="otp-input" maxlength="1" required>
                <input type="text" class="otp-input" maxlength="1" required>
                <input type="text" class="otp-input" maxlength="1" required>
            </div>
            <div id="msgBox"></div>
            <button type="submit" class="btn-verify" id="verifyBtn">Confirm Identity</button>
        </form>

        <div class="success-actions" id="actionCenter">
            <p style="color:#10b981; font-weight:600; margin-bottom:15px">✓ Verification Successful! What would you like
                to do?</p>
            <a href="/dashboard" class="btn-action btn-dash"><i class="fas fa-chart-line"></i> Access Dashboard</a>
            <a href="#" id="resetLink" class="btn-action btn-pass"><i class="fas fa-key"></i> Secure Account (Change
                Password)</a>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const email = params.get('email');
        const userId = params.get('user_id');
        document.getElementById('displayEmail').textContent = email;

        const inputs = document.querySelectorAll('.otp-input');
        inputs.forEach((input, i) => {
            input.addEventListener('input', () => {
                if (input.value && i < inputs.length - 1) inputs[i + 1].focus();
            });
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !input.value && i > 0) inputs[i - 1].focus();
            });
        });

        const form = document.getElementById('recoveryForm');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            let otp = "";
            inputs.forEach(i => otp += i.value);

            const btn = document.getElementById('verifyBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Verifying...';

            try {
                const res = await fetch('/api/verify-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId, otp })
                });
                const data = await res.json();

                if (data.verified) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('role', data.role);
                    localStorage.setItem('user_id', data.user_id);

                    form.style.display = 'none';
                    document.getElementById('subtext').style.display = 'none';
                    document.getElementById('actionCenter').style.display = 'flex';

                    // Generate reset link using a dummy session since identity is proven
                    // In a live system, we'd use the verify-otp token to authorize a reset route
                    // But here we'll redirect to a simplified reset form if identity is proven
                    // Actually, the user already proved identity, so we can redirect to /api/confirm-reset (it needs a token)
                    // Let's just use the current login data to simulate it or redirect to forgot-password flow

                    // We'll use a hack for this academic project: clicking "Secure Account" will just trigger the forgot-password logic
                    document.getElementById('resetLink').addEventListener('click', async () => {
                        alert("For your security, a new password reset link is being generated for this session.");
                        const res2 = await fetch('/api/forgot-password', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ email: email })
                        });
                        if (res2.ok) {
                            alert("Done! Please check your email one last time to SET your new password. This confirms the multi-layer security.");
                            window.location.href = '/';
                        }
                    });

                } else {
                    const msg = document.getElementById('msgBox');
                    msg.style.display = 'block';
                    msg.style.background = 'rgba(239,68,68,0.1)';
                    msg.style.color = '#fca5a5';
                    msg.textContent = data.message || "Invalid Security Code.";
                    btn.disabled = false;
                    btn.textContent = 'Confirm Identity';
                }
            } catch (err) {
                alert("Connection Error.");
                btn.disabled = false;
                btn.textContent = 'Confirm Identity';
            }
        });
    </script>
</body>

</html>
